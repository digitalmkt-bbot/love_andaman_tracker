<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Andaman — Task Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Firebase (compat for simple global API) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: "Plus Jakarta Sans", "IBM Plex Sans Thai", system-ui, sans-serif; background: #F4F1EA; color: #0B1220; }
    .boot { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; padding: 24px; }
    .spinner { width: 28px; height: 28px; border: 3px solid #E5E0D3; border-top-color: #1E3A5F; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type="range"] { accent-color: #1E3A5F; }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="spinner"></div>
      <div style="color: #64748B; font-size: 14px;">กำลังโหลด… (ครั้งแรกใช้เวลา ~2-3 วิ)</div>
    </div>
  </div>

  
  <!-- Password lock (keeps bots out of public repos) -->
  <script>
    /* =========================================================================
       🔒 STEP 0 — Password ของทีม
       Default: "loveandaman2026"
       ----------
       วิธีเปลี่ยน password:
       1. เปิด browser console (F12) ในหน้านี้
       2. paste: await sha256('รหัสใหม่ของพี่') แล้ว Enter
       3. copy hash ที่ได้ ใส่แทน PASSWORD_HASH ด้านล่าง
       4. save + deploy ใหม่
       ========================================================================= */
    const PASSWORD_HASH = '980d065ed3118d032f292a2d8abeedac72e4056976cfd20bf85c23f7c73a879b';
    const LOCK_VERSION = 'v1';  // bump นี้จะบังคับให้ทุกคนกรอก password อีกรอบ

    async function sha256(text) {
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    window.sha256 = sha256;

    const UNLOCK_KEY = 'la_unlocked_' + LOCK_VERSION;

    function showLockScreen() {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0B1220 0%,#1E3A5F 100%);">
          <div style="background:#FFFFFF;border-radius:20px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.3);">
            <div style="text-align:center;margin-bottom:28px;">
              <div style="width:64px;height:64px;margin:0 auto 16px;background:linear-gradient(135deg,#1E3A5F,#0EA5E9);border-radius:16px;display:flex;align-items:center;justify-content:center;color:white;font-size:32px;font-weight:800;">V</div>
              <div style="font-size:22px;font-weight:700;color:#0B1220;line-height:1.2;">Love Andaman</div>
              <div style="font-size:13px;color:#64748B;margin-top:4px;">Team Task Tracker</div>
            </div>
            <form id="unlock-form">
              <label style="display:block;font-size:12px;font-weight:600;color:#0B1220;margin-bottom:6px;">รหัสผ่านทีม</label>
              <input id="pw-input" type="password" autocomplete="current-password" autofocus
                style="width:100%;padding:12px 14px;border:1px solid #E5E0D3;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;"
                placeholder="••••••••" />
              <div id="pw-error" style="color:#BE123C;font-size:12px;margin-top:8px;min-height:16px;"></div>
              <button type="submit"
                style="width:100%;margin-top:14px;padding:12px;background:#1E3A5F;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">
                เข้าสู่ระบบ
              </button>
            </form>
            <div style="text-align:center;font-size:11px;color:#94A3B8;margin-top:20px;line-height:1.6;">
              รหัสผ่านสำหรับทีม Marketing เท่านั้น<br/>
              ถามได้ที่ admin ของทีม
            </div>
          </div>
        </div>
      `;
      document.getElementById('unlock-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('pw-input');
        const err = document.getElementById('pw-error');
        err.textContent = '';
        const hash = await sha256(input.value);
        if (hash === PASSWORD_HASH) {
          try { localStorage.setItem(UNLOCK_KEY, '1'); } catch (e) {}
          location.reload();
        } else {
          err.textContent = '❌ รหัสผ่านไม่ถูกต้อง';
          input.value = '';
          input.focus();
        }
      });
    }

    // Check if already unlocked
    let unlocked = false;
    try { unlocked = localStorage.getItem(UNLOCK_KEY) === '1'; } catch (e) {}

    if (!unlocked) {
      showLockScreen();
      window.__LOCKED__ = true;  // flag so Firebase/App scripts skip
    }
  </script>

  <!-- Firebase setup + storage adapter -->
  <script>
    /* =========================================================================
       🔧 STEP 1 — ใส่ Firebase config ของพี่ที่นี่
       ดูวิธีเอา config ใน README.txt
       ========================================================================= */
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyA1iw_5SloYCdM7Nxqrg6DWbwYoMVnX3UE",
      authDomain: "love-andaman-tracker.firebaseapp.com",
      projectId: "love-andaman-tracker",
      storageBucket: "love-andaman-tracker.firebasestorage.app",
      messagingSenderId: "515062114844",
      appId: "1:515062114844:web:ae92a7cadd0617d3b80dd9",
      measurementId: "G-EJLZM7Y50F"
    };
    /* ===================== END SETUP ========================================= */

    const DOC_PATH = { col: 'love_andaman_tracker', doc: 'state' };

    if (window.__LOCKED__) throw new Error('locked');

    if (FIREBASE_CONFIG.apiKey === "PASTE_API_KEY_HERE") {
      document.getElementById('root').innerHTML =
        '<div class="boot" style="text-align:center;max-width:560px;margin:0 auto;">' +
          '<div style="font-family:serif;font-size:28px;font-weight:700;color:#0B1220;">⚙ Setup Required</div>' +
          '<div style="color:#64748B;line-height:1.7;">ยังไม่ได้กรอก Firebase config<br/>' +
          'เปิดไฟล์ <code style="background:#EDE6D6;padding:2px 6px;border-radius:4px;">index.html</code> ด้วย Notepad / VS Code<br/>' +
          'แล้วใส่ค่า config ในส่วน <code style="background:#EDE6D6;padding:2px 6px;border-radius:4px;">FIREBASE_CONFIG</code></div>' +
          '<div style="font-size:12px;color:#94A3B8;margin-top:8px;">ดูขั้นตอนใน README.txt</div>' +
        '</div>';
      throw new Error('Firebase config not set');
    }

    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    const docRef = db.collection(DOC_PATH.col).doc(DOC_PATH.doc);

    // Firebase-backed storage adapter (shape matches Claude's window.storage)
    window.storage = {
      async get(key, shared) {
        // Force server fetch (no cache) to always get latest data
        const snap = await docRef.get({ source: 'server' });
        if (!snap.exists) return null;
        const data = snap.data();
        return data[key] !== undefined ? { value: data[key] } : null;
      },
      async set(key, value, shared) {
        await docRef.set({ [key]: value, _updatedAt: Date.now() }, { merge: true });
      },
    };

    // Real-time updates: dispatch event when remote changes arrive
    let _lastLocalSet = 0;
    const origSet = window.storage.set;
    window.storage.set = async function (key, value, shared) {
      _lastLocalSet = Date.now();
      return origSet.call(window.storage, key, value, shared);
    };
    docRef.onSnapshot((snap) => {
      if (!snap.exists) return;
      const ts = (snap.data() && snap.data()._updatedAt) || 0;
      // Only notify if update came from elsewhere (> 1.5s after our local set)
      if (ts > _lastLocalSet + 1500) {
        window.dispatchEvent(new Event('remote-update'));
      }
    }, (err) => console.warn('Firestore snapshot error:', err));

    // ===== Per-record data layer in the existing 'state' doc (no rules change needed) =====
    // Each record is its own nested-map field (T/P/J). Writes use field-level merge,
    // so concurrent edits to different records never overwrite each other.
    window.fb = {
      subscribeState(cb) {
        return docRef.onSnapshot((snap) => {
          const d = snap.exists ? (snap.data() || {}) : {};
          const vals = (m) => (m && typeof m === 'object' && !Array.isArray(m)) ? Object.keys(m).map((k) => m[k]).filter(Boolean) : [];
          cb({
            tasks: vals(d.T),
            posts: vals(d.P),
            jobs: vals(d.J),
            projects: Array.isArray(d.projectsV2) && d.projectsV2.length ? d.projectsV2 : null,
            currentProjectId: d.currentProjectV2 || null,
            team: Array.isArray(d.teamV2) ? d.teamV2 : null,
            _exists: snap.exists,
          });
        }, (err) => console.warn('state snapshot error:', err));
      },
      putRecord(field, id, obj) {
        const u = { _updatedAt: Date.now() }; u[field] = {}; u[field][id] = obj;
        return docRef.set(u, { merge: true });
      },
      patchRecord(field, id, partial) {
        const u = { _updatedAt: Date.now() }; u[field] = {}; u[field][id] = partial;
        return docRef.set(u, { merge: true });
      },
      delRecord(field, id) {
        const u = { _updatedAt: Date.now() };
        u[field + '.' + id] = firebase.firestore.FieldValue.delete();
        return docRef.update(u);
      },
      deleteFields(paths, meta) {
        const u = { _updatedAt: Date.now() };
        (paths || []).forEach((p) => { u[p] = firebase.firestore.FieldValue.delete(); });
        if (meta) { const map = { projects: 'projectsV2', currentProjectId: 'currentProjectV2', team: 'teamV2' }; Object.keys(meta).forEach((k) => { u[map[k] || k] = meta[k]; }); }
        return docRef.update(u);
      },
      setMeta(obj) {
        const map = { projects: 'projectsV2', currentProjectId: 'currentProjectV2', team: 'teamV2' };
        const u = { _updatedAt: Date.now() };
        Object.keys(obj).forEach((k) => { u[map[k] || k] = obj[k]; });
        return docRef.set(u, { merge: true });
      },
      bulkSet(field, map) { const u = { _updatedAt: Date.now() }; u[field] = map; return docRef.set(u, { merge: true }); },
      raw: docRef,
    };

    // ===== Automatic daily rotating backups (keeps last 14; runs on load) =====
    window.ensureDailyBackup = async function () {
      try {
        const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Bangkok' }); // YYYY-MM-DD
        const col = db.collection(DOC_PATH.col);
        const bref = col.doc('backup_auto_' + today);
        const exists = await bref.get();
        if (!exists.exists) {
          const cur = await docRef.get({ source: 'server' });
          if (cur.exists) {
            await bref.set(Object.assign({}, cur.data(), { _autoBackup: true, _backupDate: today, _backupAt: Date.now() }));
          }
        }
        // prune: keep newest 14 auto-backups
        const snap = await col.get();
        const backups = [];
        snap.forEach((d) => { if (d.id.indexOf('backup_auto_') === 0) backups.push(d.id); });
        backups.sort();
        for (let i = 0; i < backups.length - 14; i++) { try { await col.doc(backups[i]).delete(); } catch (e) {} }
      } catch (e) { console.warn('auto-backup error:', e); }
    };
    setTimeout(function () { window.ensureDailyBackup(); }, 2500);
  </script>
